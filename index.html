<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Check List Consultor - Login</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Firebase -->
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
        
        * {
            font-family: 'Inter', sans-serif;
        }
        
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
        }
        
        .glass-effect {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
        }
        
        .input-focus-effect:focus {
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }
        
        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            transition: all 0.3s ease;
        }
        
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px -5px rgba(102, 126, 234, 0.4);
        }
        
        .btn-outline {
            border: 2px solid #667eea;
            color: #667eea;
            transition: all 0.3s ease;
        }
        
        .btn-outline:hover {
            background: #667eea;
            color: white;
        }
        
        .slide-up {
            animation: slideUp 0.5s ease-out;
        }
        
        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        .fade-in {
            animation: fadeIn 0.5s ease-out;
        }
        
        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }
        
        .password-strength {
            height: 4px;
            transition: all 0.3s ease;
        }
        
        .toast {
            position: fixed;
            top: 20px;
            right: 20px;
            padding: 16px 24px;
            background: white;
            border-radius: 12px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.1);
            transform: translateX(400px);
            transition: transform 0.3s ease;
            z-index: 9999;
        }
        
        .toast.show {
            transform: translateX(0);
        }
        
        .toast.success {
            border-left: 4px solid #10b981;
        }
        
        .toast.error {
            border-left: 4px solid #ef4444;
        }
        
        .toast.warning {
            border-left: 4px solid #f59e0b;
        }
    </style>
</head>
<body class="flex items-center justify-center p-4">
    
    <!-- Toast Notification -->
    <div id="toast" class="toast flex items-center gap-3">
        <i id="toastIcon" class="fas fa-check-circle text-green-500 text-xl"></i>
        <span id="toastMessage" class="text-gray-700 font-medium"></span>
    </div>
    
    <!-- Loading Overlay -->
    <div id="loadingOverlay" class="fixed inset-0 bg-black/50 backdrop-blur-sm z-50 hidden items-center justify-center">
        <div class="bg-white rounded-2xl p-8 flex flex-col items-center gap-4">
            <div class="w-16 h-16 border-4 border-gray-200 border-t-[#667eea] rounded-full animate-spin"></div>
            <p class="text-gray-600 font-medium" id="loadingMessage">Carregando...</p>
        </div>
    </div>
    
    <!-- Main Container -->
    <div class="w-full max-w-5xl bg-white/10 backdrop-blur-lg rounded-3xl shadow-2xl overflow-hidden slide-up">
        <div class="flex flex-col md:flex-row">
            
            <!-- Left Side - Apenas CheckList 2026 com imagem de fundo -->
            <div class="md:w-1/2 relative overflow-hidden p-12 text-white flex items-center justify-center min-h-[300px] md:min-h-full" 
                 style="background-image: url('https://images.unsplash.com/photo-1557804506-669a67965ba0?ixlib=rb-4.0.3&auto=format&fit=crop&w=2000&q=80'); background-size: cover; background-position: center;">
                
                <!-- Overlay escuro -->
                <div class="absolute inset-0 bg-gradient-to-br from-[#1e3c72]/95 to-[#2a5298]/95"></div>
                
                <!-- Apenas o logo e título -->
                <div class="relative z-10 text-center">
                    <div class="flex items-center justify-center gap-4 mb-4">
                        <div class="w-20 h-20 bg-white/20 rounded-3xl flex items-center justify-center backdrop-blur-sm border border-white/30">
                            <i class="fas fa-clipboard-list text-4xl"></i>
                        </div>
                    </div>
                    <h1 class="text-5xl font-bold tracking-tight">CheckList</h1>
                    <h2 class="text-7xl font-black mt-2 text-transparent bg-clip-text bg-gradient-to-r from-white to-white/80">2026</h2>
                </div>
            </div>
            
            <!-- Right Side - Forms -->
            <div class="md:w-1/2 bg-white p-12">
                
                <!-- Tabs -->
                <div class="flex gap-4 mb-8">
                    <button id="loginTab" class="tab-btn active flex-1 py-3 text-center font-semibold text-gray-600 border-b-2 transition-all" style="border-color: #667eea; color: #667eea;">
                        Entrar
                    </button>
                    <button id="registerTab" class="tab-btn flex-1 py-3 text-center font-semibold text-gray-400 border-b-2 border-transparent hover:text-gray-600 transition-all">
                        Cadastrar
                    </button>
                </div>
                
                <!-- Login Form -->
                <div id="loginForm" class="form-container space-y-6">
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-2">
                            <i class="fas fa-envelope mr-2 text-gray-400"></i>E-mail
                        </label>
                        <input type="email" id="loginEmail" placeholder="seu@email.com" 
                               class="w-full px-4 py-3 border border-gray-300 rounded-xl focus:outline-none input-focus-effect transition-all">
                    </div>
                    
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-2">
                            <i class="fas fa-lock mr-2 text-gray-400"></i>Senha
                        </label>
                        <div class="relative">
                            <input type="password" id="loginPassword" placeholder="••••••••" 
                                   class="w-full px-4 py-3 border border-gray-300 rounded-xl focus:outline-none input-focus-effect transition-all pr-12">
                            <button type="button" onclick="togglePassword('loginPassword', this)" class="absolute right-3 top-1/2 -translate-y-1/2 text-gray-400 hover:text-gray-600">
                                <i class="fas fa-eye"></i>
                            </button>
                        </div>
                    </div>
                    
                    <div class="flex items-center justify-between">
                        <label class="flex items-center gap-2">
                            <input type="checkbox" class="rounded border-gray-300 text-[#667eea] focus:ring-[#667eea]">
                            <span class="text-sm text-gray-600">Lembrar-me</span>
                        </label>
                        <button onclick="recuperarSenha()" class="text-sm text-[#667eea] hover:text-[#764ba2] transition-colors">
                            Esqueceu a senha?
                        </button>
                    </div>
                    
                    <button onclick="fazerLogin()" class="btn-primary w-full py-4 text-white font-semibold rounded-xl transition-all flex items-center justify-center gap-2">
                        <i class="fas fa-sign-in-alt"></i>
                        Entrar
                    </button>
                </div>
                
                <!-- Register Form -->
                <div id="registerForm" class="form-container space-y-6 hidden">
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-2">
                            <i class="fas fa-user mr-2 text-gray-400"></i>Nome Completo
                        </label>
                        <input type="text" id="regNome" placeholder="Seu nome" 
                               class="w-full px-4 py-3 border border-gray-300 rounded-xl focus:outline-none input-focus-effect transition-all">
                    </div>
                    
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-2">
                            <i class="fas fa-envelope mr-2 text-gray-400"></i>E-mail
                        </label>
                        <input type="email" id="regEmail" placeholder="seu@email.com" 
                               class="w-full px-4 py-3 border border-gray-300 rounded-xl focus:outline-none input-focus-effect transition-all">
                    </div>
                    
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-2">
                            <i class="fas fa-lock mr-2 text-gray-400"></i>Senha
                        </label>
                        <div class="relative">
                            <input type="password" id="regPassword" placeholder="Mínimo 6 caracteres" onkeyup="checkPasswordStrength(this.value)" 
                                   class="w-full px-4 py-3 border border-gray-300 rounded-xl focus:outline-none input-focus-effect transition-all pr-12">
                            <button type="button" onclick="togglePassword('regPassword', this)" class="absolute right-3 top-1/2 -translate-y-1/2 text-gray-400 hover:text-gray-600">
                                <i class="fas fa-eye"></i>
                            </button>
                        </div>
                        
                        <!-- Password Strength Meter -->
                        <div class="mt-2 space-y-1">
                            <div class="flex gap-1">
                                <div id="strength1" class="password-strength flex-1 bg-gray-200 rounded-full"></div>
                                <div id="strength2" class="password-strength flex-1 bg-gray-200 rounded-full"></div>
                                <div id="strength3" class="password-strength flex-1 bg-gray-200 rounded-full"></div>
                            </div>
                            <p id="strengthText" class="text-xs text-gray-500">Digite uma senha</p>
                        </div>
                    </div>
                    
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-2">
                            <i class="fas fa-lock mr-2 text-gray-400"></i>Confirmar Senha
                        </label>
                        <div class="relative">
                            <input type="password" id="regConfirmPassword" placeholder="Digite novamente" 
                                   class="w-full px-4 py-3 border border-gray-300 rounded-xl focus:outline-none input-focus-effect transition-all pr-12">
                            <button type="button" onclick="togglePassword('regConfirmPassword', this)" class="absolute right-3 top-1/2 -translate-y-1/2 text-gray-400 hover:text-gray-600">
                                <i class="fas fa-eye"></i>
                            </button>
                        </div>
                    </div>
                    
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-2">
                            <i class="fas fa-briefcase mr-2 text-gray-400"></i>Cargo
                        </label>
                        <select id="regCargo" class="w-full px-4 py-3 border border-gray-300 rounded-xl focus:outline-none input-focus-effect transition-all">
                            <option value="">Selecione...</option>
                            <option value="Consultor">Consultor</option>
                            <option value="Supervisor">Supervisor</option>
                            <option value="Coordenador">Coordenador</option>
                            <option value="Gerente">Gerente</option>
                        </select>
                    </div>
                    
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-2">
                            <i class="fas fa-map-marker-alt mr-2 text-gray-400"></i>Regional
                        </label>
                        <input type="text" id="regRegional" placeholder="Sua regional" 
                               class="w-full px-4 py-3 border border-gray-300 rounded-xl focus:outline-none input-focus-effect transition-all">
                    </div>
                    
                    <label class="flex items-center gap-2">
                        <input type="checkbox" id="termos" class="rounded border-gray-300 text-[#667eea] focus:ring-[#667eea]">
                        <span class="text-sm text-gray-600">Li e aceito os <a href="#" class="text-[#667eea] hover:underline">Termos de Uso</a></span>
                    </label>
                    
                    <button onclick="fazerCadastro()" class="btn-primary w-full py-4 text-white font-semibold rounded-xl transition-all flex items-center justify-center gap-2">
                        <i class="fas fa-user-plus"></i>
                        Criar Conta
                    </button>
                </div>
                
            </div>
        </div>
    </div>
    
    <!-- Firebase Config -->
    <script>
        // Configuração do Firebase
        const firebaseConfig = {
            apiKey: "AIzaSyBdNPXscs1-ikMOLGCzL5igJDi989RRCCQ",
            authDomain: "checklist-94b12.firebaseapp.com",
            databaseURL: "https://checklist-94b12-default-rtdb.firebaseio.com",
            projectId: "checklist-94b12",
            storageBucket: "checklist-94b12.firebasestorage.app",
            messagingSenderId: "471194751883",
            appId: "1:471194751883:web:b3ea0cad2212d5e0c6d58e",
            measurementId: "G-KJBZ2F3ZZE"
        };

        // Inicializar Firebase
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const database = firebase.database();

        // Elementos DOM
        const toast = document.getElementById('toast');
        const toastIcon = document.getElementById('toastIcon');
        const toastMessage = document.getElementById('toastMessage');
        const loadingOverlay = document.getElementById('loadingOverlay');
        const loadingMessage = document.getElementById('loadingMessage');

        // Toggle entre Login e Cadastro
        document.getElementById('loginTab').addEventListener('click', () => {
            document.getElementById('loginTab').style.borderColor = '#667eea';
            document.getElementById('loginTab').style.color = '#667eea';
            document.getElementById('registerTab').style.borderColor = 'transparent';
            document.getElementById('registerTab').style.color = '#9ca3af';
            document.getElementById('loginForm').classList.remove('hidden');
            document.getElementById('registerForm').classList.add('hidden');
        });

        document.getElementById('registerTab').addEventListener('click', () => {
            document.getElementById('registerTab').style.borderColor = '#667eea';
            document.getElementById('registerTab').style.color = '#667eea';
            document.getElementById('loginTab').style.borderColor = 'transparent';
            document.getElementById('loginTab').style.color = '#9ca3af';
            document.getElementById('registerForm').classList.remove('hidden');
            document.getElementById('loginForm').classList.add('hidden');
        });

        // Função para mostrar toast
        function showToast(message, type = 'success') {
            toastIcon.className = type === 'success' ? 'fas fa-check-circle text-green-500 text-xl' :
                                 type === 'error' ? 'fas fa-exclamation-circle text-red-500 text-xl' :
                                 'fas fa-exclamation-triangle text-yellow-500 text-xl';
            toast.className = `toast show ${type} flex items-center gap-3`;
            toastMessage.textContent = message;
            
            setTimeout(() => {
                toast.classList.remove('show');
            }, 3000);
        }

        // Função para mostrar loading
        function showLoading(show, message = 'Carregando...') {
            if (show) {
                loadingMessage.textContent = message;
                loadingOverlay.classList.remove('hidden');
                loadingOverlay.classList.add('flex');
            } else {
                loadingOverlay.classList.add('hidden');
                loadingOverlay.classList.remove('flex');
            }
        }

        // Função para toggle password visibility
        function togglePassword(inputId, btn) {
            const input = document.getElementById(inputId);
            const icon = btn.querySelector('i');
            
            if (input.type === 'password') {
                input.type = 'text';
                icon.className = 'fas fa-eye-slash';
            } else {
                input.type = 'password';
                icon.className = 'fas fa-eye';
            }
        }

        // Função para verificar força da senha
        function checkPasswordStrength(password) {
            const strength1 = document.getElementById('strength1');
            const strength2 = document.getElementById('strength2');
            const strength3 = document.getElementById('strength3');
            const strengthText = document.getElementById('strengthText');
            
            let strength = 0;
            
            if (password.length >= 6) strength++;
            if (password.match(/[a-z]/) && password.match(/[A-Z]/)) strength++;
            if (password.match(/[0-9]/) && password.match(/[^a-zA-Z0-9]/)) strength++;
            
            const colors = ['#ef4444', '#f59e0b', '#10b981'];
            const texts = ['Fraca', 'Média', 'Forte'];
            
            strength1.style.backgroundColor = strength >= 1 ? colors[0] : '#e5e7eb';
            strength2.style.backgroundColor = strength >= 2 ? colors[1] : '#e5e7eb';
            strength3.style.backgroundColor = strength >= 3 ? colors[2] : '#e5e7eb';
            
            strengthText.textContent = strength > 0 ? `Senha ${texts[strength-1]}` : 'Digite uma senha';
            strengthText.style.color = strength > 0 ? colors[strength-1] : '#6b7280';
        }

        // Função de Login
        function fazerLogin() {
            const email = document.getElementById('loginEmail').value;
            const password = document.getElementById('loginPassword').value;
            
            if (!email || !password) {
                showToast('Preencha todos os campos!', 'error');
                return;
            }
            
            showLoading(true, 'Entrando...');
            
            auth.signInWithEmailAndPassword(email, password)
                .then((userCredential) => {
                    showLoading(false);
                    showToast('Login realizado com sucesso!', 'success');
                    
                    // Salvar dados do usuário
                    localStorage.setItem('user', JSON.stringify({
                        uid: userCredential.user.uid,
                        email: userCredential.user.email
                    }));
                    
                    // Redirecionar para o checklist
                    setTimeout(() => {
                        window.location.href = 'checklist.html';
                    }, 1000);
                })
                .catch((error) => {
                    showLoading(false);
                    let mensagem = 'Erro ao fazer login!';
                    
                    if (error.code === 'auth/user-not-found') {
                        mensagem = 'Usuário não encontrado!';
                    } else if (error.code === 'auth/wrong-password') {
                        mensagem = 'Senha incorreta!';
                    } else if (error.code === 'auth/invalid-email') {
                        mensagem = 'E-mail inválido!';
                    }
                    
                    showToast(mensagem, 'error');
                });
        }

        // Função de Cadastro
        function fazerCadastro() {
            const nome = document.getElementById('regNome').value;
            const email = document.getElementById('regEmail').value;
            const password = document.getElementById('regPassword').value;
            const confirmPassword = document.getElementById('regConfirmPassword').value;
            const cargo = document.getElementById('regCargo').value;
            const regional = document.getElementById('regRegional').value;
            const termos = document.getElementById('termos').checked;
            
            // Validações
            if (!nome || !email || !password || !confirmPassword || !cargo || !regional) {
                showToast('Preencha todos os campos!', 'error');
                return;
            }
            
            if (password.length < 6) {
                showToast('A senha deve ter no mínimo 6 caracteres!', 'error');
                return;
            }
            
            if (password !== confirmPassword) {
                showToast('As senhas não coincidem!', 'error');
                return;
            }
            
            if (!termos) {
                showToast('Você precisa aceitar os termos de uso!', 'error');
                return;
            }
            
            showLoading(true, 'Criando conta...');
            
            auth.createUserWithEmailAndPassword(email, password)
                .then((userCredential) => {
                    // Atualizar perfil com nome
                    return userCredential.user.updateProfile({
                        displayName: nome
                    }).then(() => {
                        // Salvar dados adicionais no Realtime Database
                        return database.ref(`usuarios/${userCredential.user.uid}`).set({
                            nome: nome,
                            email: email,
                            cargo: cargo,
                            regional: regional,
                            dataCadastro: new Date().toISOString(),
                            uid: userCredential.user.uid
                        });
                    }).then(() => {
                        showLoading(false);
                        showToast('Conta criada com sucesso!', 'success');
                        
                        // Redirecionar para o checklist
                        setTimeout(() => {
                            window.location.href = 'checklist.html';
                        }, 1000);
                    });
                })
                .catch((error) => {
                    showLoading(false);
                    let mensagem = 'Erro ao criar conta!';
                    
                    if (error.code === 'auth/email-already-in-use') {
                        mensagem = 'E-mail já está em uso!';
                    } else if (error.code === 'auth/invalid-email') {
                        mensagem = 'E-mail inválido!';
                    } else if (error.code === 'auth/weak-password') {
                        mensagem = 'Senha muito fraca!';
                    }
                    
                    showToast(mensagem, 'error');
                });
        }

        // Recuperar senha
        function recuperarSenha() {
            const email = document.getElementById('loginEmail').value;
            
            if (!email) {
                showToast('Digite seu e-mail primeiro!', 'warning');
                return;
            }
            
            showLoading(true, 'Enviando e-mail...');
            
            auth.sendPasswordResetEmail(email)
                .then(() => {
                    showLoading(false);
                    showToast('E-mail de recuperação enviado!', 'success');
                })
                .catch((error) => {
                    showLoading(false);
                    showToast('Erro ao enviar e-mail!', 'error');
                });
        }

        // Verificar se já está logado
        auth.onAuthStateChanged((user) => {
            if (user) {
                // Se já estiver logado, redirecionar para o checklist
                window.location.href = 'checklist.html';
            }
        });
    </script>
</body>
</html>
