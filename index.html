<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Check List 2026 - Acesso</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, shrink-to-fit=no">
    
    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow: hidden; /* Evita rolagem indesejada */
        }

        /* SUA CAPA COMO FUNDO - AJUSTADA PARA CABER PERFEITAMENTE */
        .fundo-capa {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: -2;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            background-color: transparent; /* Cor de fallback */
        }

        .fundo-capa img {
            min-width: 100vw;
            min-height: 100vh;
            width: auto;
            height: auto;
            object-fit: contain; /* Mantém a proporção sem cortar */
            max-width: 100vw;
            max-height: 100vh;
            display: block;
        }



        /* Container do formulário - RESPONSIVO */
        .login-box {
            
            width: 90%;
            left: 30px;
            max-width: 400px;
            padding: clamp(10px, 5vw, 40px);
            border-radius: 20px;
            margin: 10px;
            position: relative;
            z-index: 1;
            transition: all 0.3s ease;
        }

        /* Cabeçalho com logo */
        .header {
            text-align: center;
            margin-bottom: 105px;
        }

        .header, h1 {
            color: #1e3c72;
            font-size: clamp(20px, 5vw, 28px);
            font-weight: 700;
            margin-bottom: 2px;
            text-shadow: 1px 1px 2px rgba(255,255,255,0.5);
        }

        .header p {
            color: #2a5298;
            font-size: clamp(12px, 3vw, 14px);
            font-weight: 500;
        }

        /* Mensagem de erro/sucesso */
        .mensagem {
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 20px;
            font-size: 13px;
            display: none;
            text-align: center;
            animation: slideIn 0.3s ease;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(-10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .mensagem.erro {
            background: #ffebee;
            color: #c62828;
            border: 1px solid #ef9a9a;
            display: block;
        }

        .mensagem.sucesso {
            background: #e8f5e9;
            color: #2e7d32;
            border: 1px solid #a5d6a7;
            display: block;
        }

        /* Grupo de inputs */
        .input-group {
            margin-bottom: 5px;
            position: relative;
        }

        .input-group label {
            display: block;
            margin-bottom: 2px;
            color: #1e3c72;
            font-weight: 600;
            font-size: 13px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .input-group i {
            position: absolute;
            left: 15px;
            top: 38px;
            color: #1e3c72;
            font-size: 16px;
        }

        .input-group input {
            width: 100%;
            padding: 14px 14px 14px 45px;
            border: 2px solid rgba(221, 221, 221, 0.8);
            border-radius: 10px;
            font-size: 15px;
            transition: all 0.3s;
            background: white;
        }

        .input-group input:focus {
            border-color: #1e3c72;
            outline: none;
            box-shadow: 0 0 0 3px rgba(30, 60, 114, 0.2);
            transform: translateY(-1px);
        }

        .input-group input::placeholder {
            color: #999;
            font-size: 13px;
        }

        /* Opções */
        .options {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin: 0px 0;
            font-size: 13px;
            flex-wrap: wrap;
            gap: 10px;
        }

        .remember {
            display: flex;
            align-items: center;
            gap: 8px;
            color: #333;
            cursor: pointer;
        }

        .remember input {
            width: 18px;
            height: 18px;
            cursor: pointer;
            accent-color: #1e3c72;
        }

        .forgot {
            color: #1e3c72;
            text-decoration: none;
            font-weight: 600;
            cursor: pointer;
            padding: 5px;
        }

        .forgot:hover {
            text-decoration: underline;
            color: #2a5298;
        }

        /* Botão de login */
        .btn-login {
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, #1e3c72, #2a5298);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
            cursor: pointer;
            transition: all 0.3s;
            margin-bottom: 5px;
            position: relative;
            overflow: hidden;
        }

        .btn-login::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent);
            transition: left 0.5s;
        }

        .btn-login:hover::before {
            left: 100%;
        }

        .btn-login:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(30, 60, 114, 0.4);
        }

        .btn-login:active {
            transform: translateY(0);
        }

        .btn-login:disabled {
            opacity: 0.7;
            cursor: not-allowed;
            transform: none;
        }

        /* Botão cadastrar */
        .btn-cadastrar {
            width: 100%;
            padding: 14px;
            background: transparent;
            color: #1e3c72;
            border: 2px solid #1e3c72;
            border-radius: 10px;
            font-size: 15px;
            font-weight: 600;
            text-transform: uppercase;
            cursor: pointer;
            transition: all 0.3s;
            margin-bottom: 10px;
        }

        .btn-cadastrar:hover {
            background: #1e3c72;
            color: white;
            transform: translateY(-1px);
            box-shadow: 0 5px 15px rgba(30, 60, 114, 0.3);
        }

        .btn-cadastrar:active {
            transform: translateY(0);
        }

        /* Loading */
        .loading {
            display: inline-block;
            width: 18px;
            height: 18px;
            border: 2px solid #fff;
            border-radius: 50%;
            border-top-color: transparent;
            animation: spin 0.8s linear infinite;
            margin-right: 8px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* Rodapé */
        .footer {
            text-align: center;
            margin-top: 25px;
            font-size: 11px;
            color: #666;
            padding-top: 15px;
            border-top: 1px solid rgba(0,0,0,0.1);
        }

        /* Responsividade para telas muito pequenas */
        @media (max-width: 480px) {
            .login-box {
                padding: 20px;
                margin: 10px;
            }

            .options {
                flex-direction: column;
                align-items: flex-start;
                gap: 15px;
            }

            .btn-login, .btn-cadastrar {
                padding: 14px;
                font-size: 14px;
            }
        }

        /* Ajuste para telas muito largas */
        @media (min-width: 1920px) {
            .login-box {
                max-width: 450px;
                padding: 50px;
            }
        }

        /* Animação de entrada */
        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .login-box {
            animation: fadeInUp 0.6s ease;
        }
    </style>
</head>
<body>

    <!-- SUA CAPA COMO FUNDO - AGORA SEM CORTES -->
    <div class="fundo-capa">
        <!-- ALTERE O CAMINHO PARA SUA IMAGEM -->
        <img src="./checklist.png" alt="Capa Checklist 2026" onerror="this.src='https://via.placeholder.com/1920x1080/1e3c72/ffffff?text=CHECKLIST+2026'">
    </div>
    <div class="overlay"></div>

    <!-- FORMULÁRIO DE LOGIN -->
    <div class="login-box">
        <div class="header">

        </div>

        <!-- Mensagens -->
        <div id="mensagem" class="mensagem"></div>
        <br><br><br><br><br><br><br><br><br><br><br><br><br><br><br><br><br><br><br><br>
        <!-- Formulário de Login -->
       <form id="loginForm" onsubmit="return false;">
            <div class="input-group">
                <label><i class="fas fa-envelope"></i> E-MAIL</label>
                <i class="fas fa-envelope"></i>
                <input type="email" id="email" placeholder="seu@email.com" required autocomplete="email">
            </div>

            <div class="input-group">
                <label><i class="fas fa-lock"></i> SENHA</label>
                <i class="fas fa-lock"></i>
                <input type="password" id="senha" placeholder="••••••••" required autocomplete="current-password">
            </div>

            <div class="options">
                <label class="remember">
                    <input type="checkbox" id="lembrar"> Lembrar acesso
                </label>
                <span class="forgot" onclick="recuperarSenha()">Esqueci a senha?</span>
            </div>

            <button type="button" class="btn-login" onclick="fazerLogin()" id="btnLogin">
                ENTRAR
            </button>

            <button type="button" class="btn-cadastrar" onclick="mostrarCadastro()" id="btnCadastrar">
                CRIAR NOVA CONTA
            </button>
        </form>

        <!-- Formulário de Cadastro -->
        <div id="cadastroForm" style="display: none;">
            <div class="input-group">
                <label><i class="fas fa-user"></i> NOME COMPLETO</label>
                <i class="fas fa-user"></i>
                <input type="text" id="nomeCadastro" placeholder="Seu nome completo">
            </div>
            <div class="input-group">
                <label><i class="fas fa-envelope"></i> E-MAIL</label>
                <i class="fas fa-envelope"></i>
                <input type="email" id="emailCadastro" placeholder="seu@email.com">
            </div>
            <div class="input-group">
                <label><i class="fas fa-lock"></i> SENHA</label>
                <i class="fas fa-lock"></i>
                <input type="password" id="senhaCadastro" placeholder="Mínimo 6 caracteres">
            </div>
            <button type="button" class="btn-login" onclick="cadastrarUsuario()" id="btnCadastro">
                CADASTRAR
            </button>
            <button type="button" class="btn-cadastrar" onclick="voltarLogin()">
                VOLTAR AO LOGIN
            </button>
        </div>
<br><br>
        <div class="footer">
            <i class="fas fa-copyright"></i> 2026 Panasonic - Check List Consultor
        </div>
    </div>

    <script>
        // CONFIGURAÇÃO DO FIREBASE (MESMA DO SEU CHECKLIST)
        // For Firebase JS SDK v7.20.0 and later, measurementId is optional
const firebaseConfig = {
  apiKey: "AIzaSyBdNPXscs1-ikMOLGCzL5igJDi989RRCCQ",
  authDomain: "checklist-94b12.firebaseapp.com",
  databaseURL: "https://checklist-94b12-default-rtdb.firebaseio.com",
  projectId: "checklist-94b12",
  storageBucket: "checklist-94b12.firebasestorage.app",
  messagingSenderId: "471194751883",
  appId: "1:471194751883:web:b3ea0cad2212d5e0c6d58e",
  measurementId: "G-KJBZ2F3ZZE"
};

        // Inicializar Firebase
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const database = firebase.database();

        // Variáveis
        let tentativas = 0;

        // Verificar se já está logado
        auth.onAuthStateChanged((user) => {
            if (user) {
                if (localStorage.getItem('lembrarLogin') === 'true') {
                    window.location.href = 'checklist.html';
                }
            }
        });

        // FUNÇÃO DE LOGIN
        function fazerLogin() {
            const email = document.getElementById('email').value.trim();
            const senha = document.getElementById('senha').value;
            const mensagem = document.getElementById('mensagem');
            const btnLogin = document.getElementById('btnLogin');
            const lembrar = document.getElementById('lembrar').checked;

            if (!email || !senha) {
                mensagem.className = 'mensagem erro';
                mensagem.innerHTML = '<i class="fas fa-exclamation-triangle"></i> Preencha e-mail e senha!';
                return;
            }

            btnLogin.innerHTML = '<span class="loading"></span> ENTRANDO...';
            btnLogin.disabled = true;

            auth.signInWithEmailAndPassword(email, senha)
                .then((userCredential) => {
                    const user = userCredential.user;
                    
                    if (lembrar) {
                        localStorage.setItem('lembrarLogin', 'true');
                        localStorage.setItem('userEmail', email);
                    } else {
                        localStorage.removeItem('lembrarLogin');
                    }

                    database.ref('usuarios/' + user.uid).once('value')
                        .then((snapshot) => {
                            const userData = snapshot.val();
                            
                            sessionStorage.setItem('userId', user.uid);
                            sessionStorage.setItem('userNome', userData?.nome || email.split('@')[0]);
                            
                            mensagem.className = 'mensagem sucesso';
                            mensagem.innerHTML = '<i class="fas fa-check-circle"></i> Login realizado! Redirecionando...';
                            
                            setTimeout(() => {
                                window.location.href = 'checklist.html';
                            }, 1500);
                        });
                })
                .catch((error) => {
                    tentativas++;
                    
                    let erroMsg = '';
                    switch(error.code) {
                        case 'auth/user-not-found':
                            erroMsg = 'Usuário não encontrado!';
                            break;
                        case 'auth/wrong-password':
                            erroMsg = 'Senha incorreta! Tentativas: ' + tentativas + '/5';
                            break;
                        case 'auth/invalid-email':
                            erroMsg = 'E-mail inválido!';
                            break;
                        default:
                            erroMsg = 'Erro ao fazer login: ' + error.message;
                    }

                    mensagem.className = 'mensagem erro';
                    mensagem.innerHTML = '<i class="fas fa-times-circle"></i> ' + erroMsg;
                    
                    btnLogin.innerHTML = 'ENTRAR';
                    btnLogin.disabled = false;
                });
        }

        // FUNÇÃO DE CADASTRO
        function cadastrarUsuario() {
            const nome = document.getElementById('nomeCadastro').value.trim();
            const email = document.getElementById('emailCadastro').value.trim();
            const senha = document.getElementById('senhaCadastro').value;
            const mensagem = document.getElementById('mensagem');
            const btnCadastro = document.getElementById('btnCadastro');

            if (!nome || !email || !senha) {
                mensagem.className = 'mensagem erro';
                mensagem.innerHTML = '<i class="fas fa-exclamation-triangle"></i> Preencha todos os campos!';
                return;
            }

            if (senha.length < 6) {
                mensagem.className = 'mensagem erro';
                mensagem.innerHTML = '<i class="fas fa-exclamation-triangle"></i> A senha deve ter no mínimo 6 caracteres!';
                return;
            }

            btnCadastro.innerHTML = '<span class="loading"></span> CADASTRANDO...';
            btnCadastro.disabled = true;

            auth.createUserWithEmailAndPassword(email, senha)
                .then((userCredential) => {
                    const user = userCredential.user;
                    
                    return user.updateProfile({
                        displayName: nome
                    }).then(() => {
                        return database.ref('usuarios/' + user.uid).set({
                            nome: nome,
                            email: email,
                            dataCriacao: new Date().toISOString(),
                            tipo: 'consultor',
                            ativo: true
                        });
                    }).then(() => {
                        mensagem.className = 'mensagem sucesso';
                        mensagem.innerHTML = '<i class="fas fa-check-circle"></i> Cadastro realizado! Faça o login.';
                        
                        setTimeout(() => {
                            voltarLogin();
                        }, 2000);
                    });
                })
                .catch((error) => {
                    let erroMsg = '';
                    switch(error.code) {
                        case 'auth/email-already-in-use':
                            erroMsg = 'Este e-mail já está cadastrado!';
                            break;
                        case 'auth/invalid-email':
                            erroMsg = 'E-mail inválido!';
                            break;
                        case 'auth/weak-password':
                            erroMsg = 'Senha muito fraca!';
                            break;
                        default:
                            erroMsg = 'Erro ao cadastrar: ' + error.message;
                    }

                    mensagem.className = 'mensagem erro';
                    mensagem.innerHTML = '<i class="fas fa-times-circle"></i> ' + erroMsg;
                    
                    btnCadastro.innerHTML = 'CADASTRAR';
                    btnCadastro.disabled = false;
                });
        }

        // FUNÇÃO DE RECUPERAR SENHA
        function recuperarSenha() {
            const email = document.getElementById('email').value.trim();
            const mensagem = document.getElementById('mensagem');

            if (!email) {
                mensagem.className = 'mensagem erro';
                mensagem.innerHTML = '<i class="fas fa-exclamation-triangle"></i> Digite seu e-mail para recuperar a senha!';
                return;
            }

            auth.sendPasswordResetEmail(email)
                .then(() => {
                    mensagem.className = 'mensagem sucesso';
                    mensagem.innerHTML = '<i class="fas fa-check-circle"></i> E-mail de recuperação enviado! Verifique sua caixa de entrada.';
                })
                .catch((error) => {
                    mensagem.className = 'mensagem erro';
                    mensagem.innerHTML = '<i class="fas fa-times-circle"></i> Erro: ' + error.message;
                });
        }

        // MOSTRAR TELA DE CADASTRO
        function mostrarCadastro() {
            document.getElementById('loginForm').style.display = 'none';
            document.getElementById('cadastroForm').style.display = 'block';
            document.getElementById('mensagem').innerHTML = '';
            document.getElementById('mensagem').className = 'mensagem';
        }

        // VOLTAR PARA LOGIN
        function voltarLogin() {
            document.getElementById('loginForm').style.display = 'block';
            document.getElementById('cadastroForm').style.display = 'none';
            document.getElementById('mensagem').innerHTML = '';
            document.getElementById('mensagem').className = 'mensagem';
            
            document.getElementById('nomeCadastro').value = '';
            document.getElementById('emailCadastro').value = '';
            document.getElementById('senhaCadastro').value = '';
        }

        // Preencher e-mail salvo
        window.onload = function() {
            const savedEmail = localStorage.getItem('userEmail');
            if (savedEmail) {
                document.getElementById('email').value = savedEmail;
                document.getElementById('lembrar').checked = true;
            }
            
            // Verificar se a imagem carregou
            const img = document.querySelector('.fundo-capa img');
            if (img.complete) {
                console.log('✅ Capa carregada com sucesso!');
            } else {
                img.onload = () => console.log('✅ Capa carregada com sucesso!');
                img.onerror = () => console.log('⚠️ Usando imagem de fallback');
            }
        };

        // Enter para login
        document.addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                if (document.getElementById('loginForm').style.display !== 'none') {
                    fazerLogin();
                }
            }
        });
    </script>
</body>
</html>
