<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <title>Check List 2026 - Acesso</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, shrink-to-fit=no">

    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>

    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <!-- Google Fonts: Inter -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        /* RESET & BASE */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html,
        body {
            width: 100%;
            height: 100%;
            font-family: 'Inter', sans-serif;
            background: #0f172a;
            color: #1e293b;
            overflow: hidden;
        }

        /* BACKGROUND */
        .fundo-capa {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -2;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .fundo-capa img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            filter: brightness(0.6) blur(2px);
            transform: scale(1.05);
            /* Avoid white edges on blur */
        }

        .overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, rgba(15, 23, 42, 0.8) 0%, rgba(30, 58, 138, 0.4) 100%);
            z-index: -1;
        }

        /* MAIN CONTAINER */
        body {
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        /* LOGIN CARD */
        .login-box {
            width: 100%;
            max-width: 420px;
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border-radius: 24px;
            padding: 40px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            animation: fadeInScale 0.6s cubic-bezier(0.16, 1, 0.3, 1);
            position: relative;
            z-index: 1;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        @keyframes fadeInScale {
            from {
                opacity: 0;
                transform: scale(0.95) translateY(20px);
            }

            to {
                opacity: 1;
                transform: scale(1) translateY(0);
            }
        }

        /* HEADER */
        .header {
            text-align: center;
            margin-bottom: 32px;
        }

        .logo-placeholder {
            width: 64px;
            height: 64px;
            background: #1e3c72;
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 16px;
            color: white;
            font-size: 24px;
            box-shadow: 0 10px 15px -3px rgba(30, 60, 114, 0.3);
        }

        .header h1 {
            color: #0f172a;
            font-size: 24px;
            font-weight: 800;
            letter-spacing: -0.5px;
            margin-bottom: 8px;
        }

        .header p {
            color: #64748b;
            font-size: 14px;
            font-weight: 400;
        }

        /* MESSAGES */
        .mensagem {
            padding: 12px 16px;
            border-radius: 12px;
            margin-bottom: 24px;
            font-size: 13px;
            display: none;
            align-items: center;
            gap: 10px;
            font-weight: 500;
        }

        .mensagem.erro {
            display: flex;
            background: #fee2e2;
            color: #b91c1c;
            border: 1px solid #fecaca;
        }

        .mensagem.sucesso {
            display: flex;
            background: #dcfce7;
            color: #15803d;
            border: 1px solid #bbf7d0;
        }

        /* INPUTS */
        .input-group {
            margin-bottom: 20px;
        }

        .input-group label {
            display: block;
            margin-bottom: 8px;
            color: #475569;
            font-weight: 600;
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .input-wrapper {
            position: relative;
        }

        .input-wrapper i {
            position: absolute;
            left: 16px;
            top: 50%;
            transform: translateY(-50%);
            color: #94a3b8;
            font-size: 16px;
            transition: color 0.3s;
        }

        .input-group input {
            width: 100%;
            padding: 14px 14px 14px 48px;
            background: #f8fafc;
            border: 1px solid #e2e8f0;
            border-radius: 12px;
            font-size: 15px;
            color: #1e293b;
            transition: all 0.2s;
            font-family: inherit;
        }

        .input-group input:focus {
            background: #fff;
            border-color: #1e3c72;
            outline: none;
            box-shadow: 0 0 0 4px rgba(30, 60, 114, 0.1);
        }

        .input-group input:focus+i {
            color: #1e3c72;
        }

        /* OPTIONS */
        .options {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
            font-size: 14px;
        }

        .remember {
            display: flex;
            align-items: center;
            gap: 8px;
            color: #64748b;
            cursor: pointer;
            user-select: none;
        }

        .remember input {
            width: 18px;
            height: 18px;
            cursor: pointer;
            accent-color: #1e3c72;
            border-radius: 4px;
        }

        .forgot {
            color: #1e3c72;
            text-decoration: none;
            font-weight: 600;
            padding: 4px;
            border-radius: 4px;
            transition: background 0.2s;
        }

        .forgot:hover {
            background: rgba(30, 60, 114, 0.05);
        }

        /* BUTTONS */
        .btn-login {
            width: 100%;
            padding: 16px;
            background: #1e3c72;
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s;
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .btn-login:hover {
            background: #152c52;
            transform: translateY(-1px);
            box-shadow: 0 4px 12px rgba(30, 60, 114, 0.25);
        }

        .btn-login:active {
            transform: translateY(0);
        }

        .btn-login:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .btn-cadastrar {
            width: 100%;
            padding: 14px;
            background: transparent;
            color: #475569;
            border: 1px solid #e2e8f0;
            border-radius: 12px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }

        .btn-cadastrar:hover {
            background: #f8fafc;
            border-color: #cbd5e1;
            color: #1e293b;
        }

        /* LOADING */
        .loading {
            width: 20px;
            height: 20px;
            border: 3px solid rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            border-top-color: white;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        /* FOOTER */
        .footer {
            text-align: center;
            margin-top: 32px;
            font-size: 12px;
            color: #94a3b8;
            border-top: 1px solid #f1f5f9;
            padding-top: 24px;
        }

        /* MOBILE OPTIMIZATION */
        @media (max-width: 480px) {
            .login-box {
                padding: 32px 24px;
                border-radius: 20px;
            }

            .header h1 {
                font-size: 20px;
            }
        }
    </style>
</head>

<body>

    <!-- OVERLAY & BACKGROUND -->
    <div class="fundo-capa">
        <img src="./checklist.png" alt="Capa Checklist 2026"
            onerror="this.src='https://via.placeholder.com/1920x1080/1e3c72/ffffff?text=CHECKLIST+2026'">
    </div>
    <div class="overlay"></div>

    <!-- MAIN CARD -->
    <div class="login-box">
        <div class="header">
            <div class="logo-placeholder">
                <i class="fas fa-clipboard-check"></i>
            </div>
            <h1>Check List 2026</h1>
            <p>Panasonic Brasil</p>
        </div>

        <!-- Mensagens -->
        <div id="mensagem" class="mensagem"></div>

        <!-- Login Form -->
        <div id="loginForm">
            <div class="input-group">
                <label for="email">E-mail de Acesso</label>
                <div class="input-wrapper">
                    <i class="fas fa-envelope"></i>
                    <input type="email" id="email" placeholder="exemplo@email.com" required autocomplete="email">
                </div>
            </div>

            <div class="input-group">
                <label for="senha">Senha</label>
                <div class="input-wrapper">
                    <i class="fas fa-lock"></i>
                    <input type="password" id="senha" placeholder="••••••••" required autocomplete="current-password">
                </div>
            </div>

            <div class="options">
                <label class="remember">
                    <input type="checkbox" id="lembrar"> Lembrar acesso
                </label>
                <span class="forgot" onclick="recuperarSenha()">Esqueci a senha?</span>
            </div>

            <button type="button" class="btn-login" onclick="fazerLogin()" id="btnLogin">
                Acessar Painel
            </button>

            <button type="button" class="btn-cadastrar" onclick="mostrarCadastro()" id="btnMostrarCadastro">
                Criar Nova Conta
            </button>
        </div>

        <!-- Cadastro Form -->
        <div id="cadastroForm" style="display: none;">
            <div class="input-group">
                <label>Nome Completo</label>
                <div class="input-wrapper">
                    <i class="fas fa-user"></i>
                    <input type="text" id="nomeCadastro" placeholder="Seu nome completo">
                </div>
            </div>
            <div class="input-group">
                <label>E-mail Corporativo</label>
                <div class="input-wrapper">
                    <i class="fas fa-envelope"></i>
                    <input type="email" id="emailCadastro" placeholder="exemplo@email.com">
                </div>
            </div>
            <div class="input-group">
                <label>Definir Senha</label>
                <div class="input-wrapper">
                    <i class="fas fa-lock"></i>
                    <input type="password" id="senhaCadastro" placeholder="Mínimo 6 caracteres">
                </div>
            </div>
            <button type="button" class="btn-login" onclick="cadastrarUsuario()" id="btnCadastro">
                Finalizar Cadastro
            </button>
            <button type="button" class="btn-cadastrar" onclick="voltarLogin()">
                Voltar ao Login
            </button>
        </div>

        <div class="footer">
            <p>&copy; 2026 Panasonic Brasil · Check List</p>
        </div>
    </div>

    <script>
        // CONFIGURAÇÃO DO FIREBASE (MESMA DO SEU CHECKLIST)
        // For Firebase JS SDK v7.20.0 and later, measurementId is optional
        const firebaseConfig = {
            apiKey: "AIzaSyBdNPXscs1-ikMOLGCzL5igJDi989RRCCQ",
            authDomain: "checklist-94b12.firebaseapp.com",
            databaseURL: "https://checklist-94b12-default-rtdb.firebaseio.com",
            projectId: "checklist-94b12",
            storageBucket: "checklist-94b12.firebasestorage.app",
            messagingSenderId: "471194751883",
            appId: "1:471194751883:web:b3ea0cad2212d5e0c6d58e",
            measurementId: "G-KJBZ2F3ZZE"
        };

        // Inicializar Firebase
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const database = firebase.database();

        // Variáveis
        let tentativas = 0;

        // Verificar se já está logado
        auth.onAuthStateChanged((user) => {
            if (user) {
                if (localStorage.getItem('lembrarLogin') === 'true') {
                    window.location.href = 'checklist.html';
                }
            }
        });

        // FUNÇÃO DE LOGIN
        function fazerLogin() {
            const email = document.getElementById('email').value.trim();
            const senha = document.getElementById('senha').value;
            const mensagem = document.getElementById('mensagem');
            const btnLogin = document.getElementById('btnLogin');
            const lembrar = document.getElementById('lembrar').checked;

            if (!email || !senha) {
                mensagem.className = 'mensagem erro';
                mensagem.innerHTML = '<i class="fas fa-exclamation-triangle"></i> Preencha e-mail e senha!';
                return;
            }

            btnLogin.innerHTML = '<span class="loading"></span> ENTRANDO...';
            btnLogin.disabled = true;

            auth.signInWithEmailAndPassword(email, senha)
                .then((userCredential) => {
                    const user = userCredential.user;

                    if (lembrar) {
                        localStorage.setItem('lembrarLogin', 'true');
                        localStorage.setItem('userEmail', email);
                    } else {
                        localStorage.removeItem('lembrarLogin');
                    }

                    database.ref('usuarios/' + user.uid).once('value')
                        .then((snapshot) => {
                            const userData = snapshot.val();

                            sessionStorage.setItem('userId', user.uid);
                            sessionStorage.setItem('userNome', userData?.nome || email.split('@')[0]);

                            mensagem.className = 'mensagem sucesso';
                            mensagem.innerHTML = '<i class="fas fa-check-circle"></i> Login realizado! Redirecionando...';

                            setTimeout(() => {
                                window.location.href = 'checklist.html';
                            }, 1500);
                        });
                })
                .catch((error) => {
                    tentativas++;

                    let erroMsg = '';
                    switch (error.code) {
                        case 'auth/user-not-found':
                            erroMsg = 'Usuário não encontrado!';
                            break;
                        case 'auth/wrong-password':
                            erroMsg = 'Senha incorreta! Tentativas: ' + tentativas + '/5';
                            break;
                        case 'auth/invalid-email':
                            erroMsg = 'E-mail inválido!';
                            break;
                        default:
                            erroMsg = 'Erro ao fazer login: ' + error.message;
                    }

                    mensagem.className = 'mensagem erro';
                    mensagem.innerHTML = '<i class="fas fa-times-circle"></i> ' + erroMsg;

                    btnLogin.innerHTML = 'ENTRAR';
                    btnLogin.disabled = false;
                });
        }

        // FUNÇÃO DE CADASTRO
        function cadastrarUsuario() {
            const nome = document.getElementById('nomeCadastro').value.trim();
            const email = document.getElementById('emailCadastro').value.trim();
            const senha = document.getElementById('senhaCadastro').value;
            const mensagem = document.getElementById('mensagem');
            const btnCadastro = document.getElementById('btnCadastro');

            if (!nome || !email || !senha) {
                mensagem.className = 'mensagem erro';
                mensagem.innerHTML = '<i class="fas fa-exclamation-triangle"></i> Preencha todos os campos!';
                return;
            }

            if (senha.length < 6) {
                mensagem.className = 'mensagem erro';
                mensagem.innerHTML = '<i class="fas fa-exclamation-triangle"></i> A senha deve ter no mínimo 6 caracteres!';
                return;
            }

            btnCadastro.innerHTML = '<span class="loading"></span> CADASTRANDO...';
            btnCadastro.disabled = true;

            auth.createUserWithEmailAndPassword(email, senha)
                .then((userCredential) => {
                    const user = userCredential.user;

                    return user.updateProfile({
                        displayName: nome
                    }).then(() => {
                        return database.ref('usuarios/' + user.uid).set({
                            nome: nome,
                            email: email,
                            dataCriacao: new Date().toISOString(),
                            tipo: 'consultor',
                            ativo: true
                        });
                    }).then(() => {
                        mensagem.className = 'mensagem sucesso';
                        mensagem.innerHTML = '<i class="fas fa-check-circle"></i> Cadastro realizado! Faça o login.';

                        setTimeout(() => {
                            voltarLogin();
                        }, 2000);
                    });
                })
                .catch((error) => {
                    let erroMsg = '';
                    switch (error.code) {
                        case 'auth/email-already-in-use':
                            erroMsg = 'Este e-mail já está cadastrado!';
                            break;
                        case 'auth/invalid-email':
                            erroMsg = 'E-mail inválido!';
                            break;
                        case 'auth/weak-password':
                            erroMsg = 'Senha muito fraca!';
                            break;
                        default:
                            erroMsg = 'Erro ao cadastrar: ' + error.message;
                    }

                    mensagem.className = 'mensagem erro';
                    mensagem.innerHTML = '<i class="fas fa-times-circle"></i> ' + erroMsg;

                    btnCadastro.innerHTML = 'CADASTRAR';
                    btnCadastro.disabled = false;
                });
        }

        // FUNÇÃO DE RECUPERAR SENHA
        function recuperarSenha() {
            const email = document.getElementById('email').value.trim();
            const mensagem = document.getElementById('mensagem');

            if (!email) {
                mensagem.className = 'mensagem erro';
                mensagem.innerHTML = '<i class="fas fa-exclamation-triangle"></i> Digite seu e-mail para recuperar a senha!';
                return;
            }

            auth.sendPasswordResetEmail(email)
                .then(() => {
                    mensagem.className = 'mensagem sucesso';
                    mensagem.innerHTML = '<i class="fas fa-check-circle"></i> E-mail de recuperação enviado! Verifique sua caixa de entrada.';
                })
                .catch((error) => {
                    mensagem.className = 'mensagem erro';
                    mensagem.innerHTML = '<i class="fas fa-times-circle"></i> Erro: ' + error.message;
                });
        }

        // MOSTRAR TELA DE CADASTRO
        function mostrarCadastro() {
            document.getElementById('loginForm').style.display = 'none';
            document.getElementById('cadastroForm').style.display = 'block';
            document.getElementById('mensagem').innerHTML = '';
            document.getElementById('mensagem').className = 'mensagem';
        }

        // VOLTAR PARA LOGIN
        function voltarLogin() {
            document.getElementById('loginForm').style.display = 'block';
            document.getElementById('cadastroForm').style.display = 'none';
            document.getElementById('mensagem').innerHTML = '';
            document.getElementById('mensagem').className = 'mensagem';

            document.getElementById('nomeCadastro').value = '';
            document.getElementById('emailCadastro').value = '';
            document.getElementById('senhaCadastro').value = '';
        }

        // Preencher e-mail salvo
        window.onload = function () {
            const savedEmail = localStorage.getItem('userEmail');
            if (savedEmail) {
                document.getElementById('email').value = savedEmail;
                document.getElementById('lembrar').checked = true;
            }

            // Verificar se a imagem carregou
            const img = document.querySelector('.fundo-capa img');
            if (img.complete) {
                console.log('✅ Capa carregada com sucesso!');
            } else {
                img.onload = () => console.log('✅ Capa carregada com sucesso!');
                img.onerror = () => console.log('⚠️ Usando imagem de fallback');
            }
        };

        // Enter para login
        document.addEventListener('keypress', function (e) {
            if (e.key === 'Enter') {
                if (document.getElementById('loginForm').style.display !== 'none') {
                    fazerLogin();
                }
            }
        });
    </script>
</body>

</html>
