<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <title>Check List 2026 - Acesso</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, shrink-to-fit=no">

    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>

    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <!-- Google Fonts: Inter -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <style>
        /* RESET & BASE */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html,
        body {
            width: 100%;
            height: 100%;
            font-family: 'Inter', sans-serif;
            background: #0f172a;
            color: #1e293b;
            overflow: hidden;
        }

        /* LAYOUT WRAPPER */
        .page-wrapper {
            display: flex;
            width: 100%;
            height: 100%;
            animation: fadeIn 0.8s ease;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
            }

            to {
                opacity: 1;
            }
        }

        /* BRAND SIDE (DESKTOP) */
        .brand-side {
            flex: 1.2;
            position: relative;
            background: #1e3c72;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        .brand-side img {
            position: absolute;
            width: 100%;
            height: 100%;
            object-fit: cover;
            filter: brightness(0.7) contrast(1.1);
            transition: transform 10s ease;
        }

        .brand-side:hover img {
            transform: scale(1.1);
        }

        .brand-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(to right, rgba(30, 60, 114, 0.9), rgba(30, 60, 114, 0.4));
            z-index: 1;
        }

        .brand-content {
            position: relative;
            z-index: 2;
            text-align: center;
            color: white;
            padding: 40px;
        }

        .brand-logo {
            width: 100px;
            height: 100px;
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(10px);
            border-radius: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 30px;
            font-size: 40px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.3);
        }

        .brand-content h2 {
            font-size: 36px;
            font-weight: 800;
            margin-bottom: 12px;
            letter-spacing: -1px;
        }

        .brand-content p {
            font-size: 18px;
            opacity: 0.9;
            font-weight: 300;
        }

        /* FORM SIDE */
        .form-side {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 40px;
            background: #fff;
            position: relative;
            z-index: 5;
        }

        /* MOBILE BACKGROUND */
        .mobile-bg {
            display: none;
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
        }

        .mobile-bg img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            filter: brightness(0.5) blur(3px);
        }

        .mobile-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, rgba(15, 23, 42, 0.8), rgba(30, 58, 138, 0.5));
        }

        /* LOGIN CARD */
        .login-box {
            width: 100%;
            max-width: 400px;
            animation: slideInUp 0.6s cubic-bezier(0.16, 1, 0.3, 1);
        }

        @keyframes slideInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* FORM HEADER (MOBILE ONLY) */
        .mobile-header {
            display: none;
            text-align: center;
            margin-bottom: 30px;
        }

        .mobile-header .logo-placeholder {
            width: 60px;
            height: 60px;
            background: #1e3c72;
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 15px;
            color: white;
            font-size: 24px;
        }

        .mobile-header h1 {
            font-size: 24px;
            font-weight: 800;
            color: #fff;
            margin-bottom: 5px;
        }

        .mobile-header p {
            color: rgba(255, 255, 255, 0.7);
            font-size: 14px;
        }

        /* FORM TITLES (DESKTOP) */
        .form-header {
            margin-bottom: 30px;
        }

        .form-header h1 {
            font-size: 28px;
            font-weight: 800;
            color: #0f172a;
            letter-spacing: -0.5px;
            margin-bottom: 8px;
        }

        .form-header p {
            color: #64748b;
            font-size: 14px;
        }

        /* MESSAGES */
        .mensagem {
            padding: 12px 16px;
            border-radius: 12px;
            margin-bottom: 24px;
            font-size: 13px;
            display: none;
            align-items: center;
            gap: 10px;
            font-weight: 500;
        }

        .mensagem.erro {
            display: flex;
            background: #fee2e2;
            color: #b91c1c;
            border: 1px solid #fecaca;
        }

        .mensagem.sucesso {
            display: flex;
            background: #dcfce7;
            color: #15803d;
            border: 1px solid #bbf7d0;
        }

        /* INPUTS */
        .input-group {
            margin-bottom: 20px;
        }

        .input-group label {
            display: block;
            margin-bottom: 8px;
            color: #475569;
            font-weight: 600;
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .input-wrapper {
            position: relative;
        }

        .input-wrapper i {
            position: absolute;
            left: 16px;
            top: 50%;
            transform: translateY(-50%);
            color: #94a3b8;
            font-size: 16px;
            transition: color 0.3s;
        }

        .input-group input {
            width: 100%;
            padding: 14px 14px 14px 48px;
            background: #f8fafc;
            border: 1px solid #e2e8f0;
            border-radius: 12px;
            font-size: 15px;
            color: #1e293b;
            transition: all 0.2s;
        }

        .input-group input:focus {
            background: #fff;
            border-color: #1e3c72;
            outline: none;
            box-shadow: 0 0 0 4px rgba(30, 60, 114, 0.1);
        }

        .input-group input:focus+i {
            color: #1e3c72;
        }

        /* OPTIONS */
        .options {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
            font-size: 14px;
        }

        .remember {
            display: flex;
            align-items: center;
            gap: 8px;
            color: #64748b;
            cursor: pointer;
            user-select: none;
        }

        .remember input {
            width: 18px;
            height: 18px;
            cursor: pointer;
            accent-color: #1e3c72;
        }

        .forgot {
            color: #1e3c72;
            text-decoration: none;
            font-weight: 600;
            cursor: pointer;
            padding: 4px;
        }

        .forgot:hover {
            color: #152c52;
        }

        /* BUTTONS */
        .btn-login {
            width: 100%;
            padding: 16px;
            background: #1e3c72;
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s;
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .btn-login:hover {
            background: #152c52;
            transform: translateY(-1px);
            box-shadow: 0 4px 12px rgba(30, 60, 114, 0.2);
        }

        .btn-login:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .btn-cadastrar {
            width: 100%;
            padding: 14px;
            background: transparent;
            color: #475569;
            border: 1px solid #e2e8f0;
            border-radius: 12px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }

        .btn-cadastrar:hover {
            background: #f8fafc;
        }

        /* FOOTER */
        .footer {
            text-align: center;
            margin-top: 40px;
            font-size: 12px;
            color: #94a3b8;
        }

        .footer.mobile {
            color: rgba(255, 255, 255, 0.6);
            display: none;
        }

        /* LOADING */
        .loading {
            width: 20px;
            height: 20px;
            border: 3px solid rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            border-top-color: white;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        /* RESPONSIVITY */
        @media (max-width: 900px) {
            .brand-side {
                display: none;
            }

            .form-side {
                background: transparent;
            }

            .mobile-bg,
            .mobile-header,
            .footer.mobile {
                display: block;
            }

            .form-header,
            .footer.desktop {
                display: none;
            }

            .login-box {
                background: rgba(255, 255, 255, 0.95);
                backdrop-filter: blur(10px);
                padding: 40px 30px;
                border-radius: 24px;
                box-shadow: 0 20px 40px rgba(0, 0, 0, 0.3);
            }
        }
    </style>
</head>

<body>

    <div class="page-wrapper">
        <!-- LEFT SIDE: BRANDING (DESKTOP) -->
        <div class="brand-side">
            <img src="./checklist.png" alt="Capa Checklist"
                onerror="this.src='https://via.placeholder.com/1920x1080/1e3c72/ffffff?text=CHECKLIST+2026'">
            <div class="brand-overlay"></div>
            <div class="brand-content">
                <div class="brand-logo">
                    <i class="fas fa-clipboard-check"></i>
                </div>
                <h2>Check List 2026</h2>
                <p>Otimize sua rotina de consultoria com a Panasonic Brasil.</p>
            </div>
        </div>

        <!-- RIGHT SIDE: FORM -->
        <div class="form-side">
            <!-- Mobile Optimized Background -->
            <div class="mobile-bg">
                <img src="./checklist.png" alt="Background" onerror="this.style.display='none'">
                <div class="mobile-overlay"></div>
            </div>

            <div class="login-box">
                <!-- Mobile Header -->
                <div class="mobile-header">
                    <div class="logo-placeholder">
                        <i class="fas fa-clipboard-check"></i>
                    </div>
                    <h1>Check List 2026</h1>
                    <p>Portal do Consultor · Panasonic</p>
                </div>

                <!-- Desktop Header -->
                <div class="form-header">
                    <h1>Bem-vindo!</h1>
                    <p>Faça login para acessar o painel de consultoria.</p>
                </div>

                <!-- Messages -->
                <div id="mensagem" class="mensagem"></div>

                <!-- Login Form -->
                <div id="loginForm">
                    <div class="input-group">
                        <label for="email">E-mail</label>
                        <div class="input-wrapper">
                            <i class="fas fa-envelope"></i>
                            <input type="email" id="email" placeholder="seu@email.com" required autocomplete="email">
                        </div>
                    </div>

                    <div class="input-group">
                        <label for="senha">Senha</label>
                        <div class="input-wrapper">
                            <i class="fas fa-lock"></i>
                            <input type="password" id="senha" placeholder="••••••••" required
                                autocomplete="current-password">
                        </div>
                    </div>

                    <div class="options">
                        <label class="remember">
                            <input type="checkbox" id="lembrar"> Lembrar acesso
                        </label>
                        <span class="forgot" onclick="recuperarSenha()">Esqueci a senha?</span>
                    </div>

                    <button type="button" class="btn-login" onclick="fazerLogin()" id="btnLogin">
                        Acessar Portal
                    </button>

                    <button type="button" class="btn-cadastrar" onclick="mostrarCadastro()" id="btnMostrarCadastro">
                        Criar Nova Conta
                    </button>
                </div>

                <!-- Cadastro Form -->
                <div id="cadastroForm" style="display: none;">
                    <div class="input-group">
                        <label>Nome Completo</label>
                        <div class="input-wrapper">
                            <i class="fas fa-user"></i>
                            <input type="text" id="nomeCadastro" placeholder="Seu nome completo">
                        </div>
                    </div>
                    <div class="input-group">
                        <label>E-mail Corporativo</label>
                        <div class="input-wrapper">
                            <i class="fas fa-envelope"></i>
                            <input type="email" id="emailCadastro" placeholder="seu@email.com">
                        </div>
                    </div>
                    <div class="input-group">
                        <label>Definir Senha</label>
                        <div class="input-wrapper">
                            <i class="fas fa-lock"></i>
                            <input type="password" id="senhaCadastro" placeholder="Mínimo 6 caracteres">
                        </div>
                    </div>
                    <button type="button" class="btn-login" onclick="cadastrarUsuario()" id="btnCadastro">
                        Finalizar Cadastro
                    </button>
                    <button type="button" class="btn-cadastrar" onclick="voltarLogin()">
                        Voltar ao Login
                    </button>
                </div>

                <!-- Desktop Footer -->
                <div class="footer desktop">
                    <p>&copy; 2026 Panasonic Brasil · Check List</p>
                </div>
            </div>

            <!-- Mobile Footer -->
            <div class="footer mobile" style="position: absolute; bottom: 20px; width: 100%; text-align: center;">
                <p>&copy; 2026 Panasonic Brasil</p>
            </div>
        </div>
    </div>

    <script>
        // CONFIGURAÇÃO DO FIREBASE
        const firebaseConfig = {
            apiKey: "AIzaSyBdNPXscs1-ikMOLGCzL5igJDi989RRCCQ",
            authDomain: "checklist-94b12.firebaseapp.com",
            databaseURL: "https://checklist-94b12-default-rtdb.firebaseio.com",
            projectId: "checklist-94b12",
            storageBucket: "checklist-94b12.firebasestorage.app",
            messagingSenderId: "471194751883",
            appId: "1:471194751883:web:b3ea0cad2212d5e0c6d58e",
            measurementId: "G-KJBZ2F3ZZE"
        };

        // Inicializar Firebase
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const database = firebase.database();

        let tentativas = 0;

        auth.onAuthStateChanged((user) => {
            if (user && localStorage.getItem('lembrarLogin') === 'true') {
                window.location.href = 'checklist.html';
            }
        });

        function fazerLogin() {
            const email = document.getElementById('email').value.trim();
            const senha = document.getElementById('senha').value;
            const mensagem = document.getElementById('mensagem');
            const btnLogin = document.getElementById('btnLogin');
            const lembrar = document.getElementById('lembrar').checked;

            if (!email || !senha) {
                mensagem.className = 'mensagem erro';
                mensagem.innerHTML = '<i class="fas fa-exclamation-triangle"></i> Preencha e-mail e senha!';
                return;
            }

            btnLogin.innerHTML = '<span class="loading"></span> ENTRANDO...';
            btnLogin.disabled = true;

            auth.signInWithEmailAndPassword(email, senha)
                .then((userCredential) => {
                    const user = userCredential.user;
                    if (lembrar) {
                        localStorage.setItem('lembrarLogin', 'true');
                        localStorage.setItem('userEmail', email);
                    } else {
                        localStorage.removeItem('lembrarLogin');
                    }

                    database.ref('usuarios/' + user.uid).once('value')
                        .then((snapshot) => {
                            const userData = snapshot.val();
                            sessionStorage.setItem('userId', user.uid);
                            sessionStorage.setItem('userNome', userData?.nome || email.split('@')[0]);
                            mensagem.className = 'mensagem sucesso';
                            mensagem.innerHTML = '<i class="fas fa-check-circle"></i> Login realizado! Redirecionando...';
                            setTimeout(() => { window.location.href = 'checklist.html'; }, 1500);
                        });
                })
                .catch((error) => {
                    tentativas++;
                    let erroMsg = '';
                    switch (error.code) {
                        case 'auth/user-not-found': erroMsg = 'Usuário não encontrado!'; break;
                        case 'auth/wrong-password': erroMsg = 'Senha incorreta! Tentativas: ' + tentativas + '/5'; break;
                        case 'auth/invalid-email': erroMsg = 'E-mail inválido!'; break;
                        default: erroMsg = 'Erro ao fazer login: ' + error.message;
                    }
                    mensagem.className = 'mensagem erro';
                    mensagem.innerHTML = '<i class="fas fa-times-circle"></i> ' + erroMsg;
                    btnLogin.innerHTML = 'Acessar Portal';
                    btnLogin.disabled = false;
                });
        }

        function cadastrarUsuario() {
            const nome = document.getElementById('nomeCadastro').value.trim();
            const email = document.getElementById('emailCadastro').value.trim();
            const senha = document.getElementById('senhaCadastro').value;
            const mensagem = document.getElementById('mensagem');
            const btnCadastro = document.getElementById('btnCadastro');

            if (!nome || !email || !senha) {
                mensagem.className = 'mensagem erro';
                mensagem.innerHTML = '<i class="fas fa-exclamation-triangle"></i> Preencha todos os campos!';
                return;
            }

            if (senha.length < 6) {
                mensagem.className = 'mensagem erro';
                mensagem.innerHTML = '<i class="fas fa-exclamation-triangle"></i> A senha deve ter no mínimo 6 caracteres!';
                return;
            }

            btnCadastro.innerHTML = '<span class="loading"></span> CADASTRANDO...';
            btnCadastro.disabled = true;

            auth.createUserWithEmailAndPassword(email, senha)
                .then((userCredential) => {
                    const user = userCredential.user;
                    return user.updateProfile({ displayName: nome }).then(() => {
                        return database.ref('usuarios/' + user.uid).set({
                            nome: nome,
                            email: email,
                            dataCriacao: new Date().toISOString(),
                            tipo: 'consultor',
                            ativo: true
                        });
                    }).then(() => {
                        mensagem.className = 'mensagem sucesso';
                        mensagem.innerHTML = '<i class="fas fa-check-circle"></i> Cadastro realizado! Faça o login.';
                        setTimeout(() => { voltarLogin(); }, 2000);
                    });
                })
                .catch((error) => {
                    let erroMsg = '';
                    switch (error.code) {
                        case 'auth/email-already-in-use': erroMsg = 'Este e-mail já está cadastrado!'; break;
                        case 'auth/invalid-email': erroMsg = 'E-mail inválido!'; break;
                        case 'auth/weak-password': erroMsg = 'Senha muito fraca!'; break;
                        default: erroMsg = 'Erro ao cadastrar: ' + error.message;
                    }
                    mensagem.className = 'mensagem erro';
                    mensagem.innerHTML = '<i class="fas fa-times-circle"></i> ' + erroMsg;
                    btnCadastro.innerHTML = 'Finalizar Cadastro';
                    btnCadastro.disabled = false;
                });
        }

        function recuperarSenha() {
            const email = document.getElementById('email').value.trim();
            const mensagem = document.getElementById('mensagem');
            if (!email) {
                mensagem.className = 'mensagem erro';
                mensagem.innerHTML = '<i class="fas fa-exclamation-triangle"></i> Digite seu e-mail para recuperar a senha!';
                return;
            }
            auth.sendPasswordResetEmail(email)
                .then(() => {
                    mensagem.className = 'mensagem sucesso';
                    mensagem.innerHTML = '<i class="fas fa-check-circle"></i> E-mail de recuperação enviado! Verifique sua caixa de entrada.';
                })
                .catch((error) => {
                    mensagem.className = 'mensagem erro';
                    mensagem.innerHTML = '<i class="fas fa-times-circle"></i> Erro: ' + error.message;
                });
        }

        function mostrarCadastro() {
            document.getElementById('loginForm').style.display = 'none';
            document.getElementById('cadastroForm').style.display = 'block';
            document.getElementById('mensagem').innerHTML = '';
            document.getElementById('mensagem').className = 'mensagem';
        }

        function voltarLogin() {
            document.getElementById('loginForm').style.display = 'block';
            document.getElementById('cadastroForm').style.display = 'none';
            document.getElementById('mensagem').innerHTML = '';
            document.getElementById('mensagem').className = 'mensagem';
            document.getElementById('nomeCadastro').value = '';
            document.getElementById('emailCadastro').value = '';
            document.getElementById('senhaCadastro').value = '';
        }

        window.onload = function () {
            const savedEmail = localStorage.getItem('userEmail');
            if (savedEmail) {
                document.getElementById('email').value = savedEmail;
                document.getElementById('lembrar').checked = true;
            }
        };

        document.addEventListener('keypress', function (e) {
            if (e.key === 'Enter') {
                if (document.getElementById('loginForm').style.display !== 'none') {
                    fazerLogin();
                }
            }
        });
    </script>
</body>

</html>
