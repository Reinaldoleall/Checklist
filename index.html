<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CheckList 2026 - Acesso</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
        
        body {
            font-family: 'Inter', sans-serif;
            background-color: #FAFAFA;
            color: #111827;
        }

        .input-clean {
            background-color: #F3F4F6;
            border: 1px solid transparent;
            transition: all 0.2s ease;
        }
        
        .input-clean:focus {
            background-color: #FFFFFF;
            border-color: #111827;
            box-shadow: 0 0 0 1px #111827;
            outline: none;
        }

        .btn-black {
            background-color: #111827;
            color: #FFFFFF;
            transition: background-color 0.2s ease;
        }
        
        .btn-black:hover {
            background-color: #374151;
        }

        .tab-active {
            color: #111827;
            border-bottom: 2px solid #111827;
        }

        .tab-inactive {
            color: #9CA3AF;
            border-bottom: 2px solid transparent;
        }
        
        .tab-inactive:hover {
            color: #4B5563;
        }

        /* Toast notifications */
        .toast {
            position: fixed;
            top: 24px;
            right: 24px;
            padding: 16px 24px;
            background: white;
            border-radius: 12px;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.1);
            transform: translateX(120%);
            transition: transform 0.3s ease;
            z-index: 50;
            border: 1px solid #F3F4F6;
        }
        
        .toast.show {
            transform: translateX(0);
        }

        /* Esconder scrollbar no cadastro */
        .no-scrollbar::-webkit-scrollbar {
            display: none;
        }
        .no-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4">

    <div id="toast" class="toast flex items-center gap-3">
        <i id="toastIcon" class="fas fa-check-circle text-green-500"></i>
        <span id="toastMessage" class="text-sm font-medium"></span>
    </div>

    <div id="loadingOverlay" class="fixed inset-0 bg-white/80 backdrop-blur-sm z-40 hidden items-center justify-center">
        <div class="flex flex-col items-center gap-3">
            <div class="w-8 h-8 border-2 border-gray-200 border-t-black rounded-full animate-spin"></div>
            <p class="text-sm font-medium text-gray-600" id="loadingMessage">Aguarde...</p>
        </div>
    </div>

    <div class="w-full max-w-[420px] bg-white rounded-2xl shadow-[0_8px_30px_rgb(0,0,0,0.04)] border border-gray-100 p-8 sm:p-10">
        
        <div class="text-center mb-8">
            <div class="w-12 h-12 bg-gray-50 rounded-xl flex items-center justify-center mx-auto mb-4 border border-gray-100">
                <i class="fas fa-clipboard-check text-xl text-gray-800"></i>
            </div>
            <h1 class="text-2xl font-bold tracking-tight">CheckList 2026</h1>
            <p class="text-sm text-gray-500 mt-1">Acesso exclusivo para equipe</p>
        </div>

        <div class="flex mb-8 border-b border-gray-200">
            <button id="loginTab" class="flex-1 pb-3 text-sm font-semibold tab-active transition-colors">
                Entrar
            </button>
            <button id="registerTab" class="flex-1 pb-3 text-sm font-semibold tab-inactive transition-colors">
                Criar Conta
            </button>
        </div>

        <div id="loginForm" class="space-y-4">
            <div>
                <label class="block text-xs font-semibold text-gray-600 uppercase tracking-wide mb-1.5">E-mail</label>
                <input type="email" id="loginEmail" placeholder="nome@exemplo.com" 
                       class="w-full px-4 py-3 rounded-xl input-clean text-sm">
            </div>
            
            <div>
                <div class="flex items-center justify-between mb-1.5">
                    <label class="block text-xs font-semibold text-gray-600 uppercase tracking-wide">Senha</label>
                    <button onclick="recuperarSenha()" class="text-xs font-medium text-gray-500 hover:text-black transition-colors">Esqueceu?</button>
                </div>
                <div class="relative">
                    <input type="password" id="loginPassword" placeholder="••••••••" 
                           class="w-full px-4 py-3 rounded-xl input-clean text-sm pr-10">
                    <button type="button" onclick="togglePassword('loginPassword', this)" class="absolute right-3 top-1/2 -translate-y-1/2 text-gray-400 hover:text-gray-600">
                        <i class="fas fa-eye text-sm"></i>
                    </button>
                </div>
            </div>
            
            <button onclick="fazerLogin()" class="btn-black w-full py-3.5 rounded-xl text-sm font-semibold mt-6">
                Acessar Plataforma
            </button>
        </div>

        <div id="registerForm" class="space-y-4 hidden max-h-[60vh] overflow-y-auto no-scrollbar pb-2">
            <div>
                <label class="block text-xs font-semibold text-gray-600 uppercase tracking-wide mb-1.5">Nome Completo</label>
                <input type="text" id="regNome" placeholder="Seu nome" class="w-full px-4 py-3 rounded-xl input-clean text-sm">
            </div>
            
            <div>
                <label class="block text-xs font-semibold text-gray-600 uppercase tracking-wide mb-1.5">E-mail</label>
                <input type="email" id="regEmail" placeholder="nome@exemplo.com" class="w-full px-4 py-3 rounded-xl input-clean text-sm">
            </div>
            
            <div class="grid grid-cols-2 gap-3">
                <div>
                    <label class="block text-xs font-semibold text-gray-600 uppercase tracking-wide mb-1.5">Cargo</label>
                    <select id="regCargo" class="w-full px-3 py-3 rounded-xl input-clean text-sm appearance-none cursor-pointer">
                        <option value="" disabled selected>Selecione</option>
                        <option value="Consultor">Consultor</option>
                        <option value="Supervisor">Supervisor</option>
                        <option value="Coordenador">Coordenador</option>
                        <option value="Gerente">Gerente</option>
                    </select>
                </div>
                <div>
                    <label class="block text-xs font-semibold text-gray-600 uppercase tracking-wide mb-1.5">Regional</label>
                    <input type="text" id="regRegional" placeholder="Ex: Sul" class="w-full px-4 py-3 rounded-xl input-clean text-sm">
                </div>
            </div>

            <div>
                <label class="block text-xs font-semibold text-gray-600 uppercase tracking-wide mb-1.5">Senha</label>
                <div class="relative">
                    <input type="password" id="regPassword" placeholder="Crie uma senha forte" class="w-full px-4 py-3 rounded-xl input-clean text-sm pr-10">
                    <button type="button" onclick="togglePassword('regPassword', this)" class="absolute right-3 top-1/2 -translate-y-1/2 text-gray-400 hover:text-gray-600">
                        <i class="fas fa-eye text-sm"></i>
                    </button>
                </div>
            </div>
            
            <div>
                <label class="block text-xs font-semibold text-gray-600 uppercase tracking-wide mb-1.5">Confirmar Senha</label>
                <div class="relative">
                    <input type="password" id="regConfirmPassword" placeholder="Repita a senha" class="w-full px-4 py-3 rounded-xl input-clean text-sm pr-10">
                </div>
            </div>
            
            <label class="flex items-start gap-2 pt-2 cursor-pointer">
                <input type="checkbox" id="termos" class="mt-1 rounded border-gray-300 text-black focus:ring-black">
                <span class="text-xs text-gray-500">Concordo com os <a href="#" class="text-black font-medium underline">Termos de Uso</a>.</span>
            </label>
            
            <button onclick="fazerCadastro()" class="btn-black w-full py-3.5 rounded-xl text-sm font-semibold mt-4">
                Finalizar Cadastro
            </button>
        </div>

    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyBdNPXscs1-ikMOLGCzL5igJDi989RRCCQ",
            authDomain: "checklist-94b12.firebaseapp.com",
            databaseURL: "https://checklist-94b12-default-rtdb.firebaseio.com",
            projectId: "checklist-94b12",
            storageBucket: "checklist-94b12.firebasestorage.app",
            messagingSenderId: "471194751883",
            appId: "1:471194751883:web:b3ea0cad2212d5e0c6d58e"
        };

        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const database = firebase.database();

        // UI Elements
        const loginTab = document.getElementById('loginTab');
        const registerTab = document.getElementById('registerTab');
        const loginForm = document.getElementById('loginForm');
        const registerForm = document.getElementById('registerForm');
        const toast = document.getElementById('toast');
        const loadingOverlay = document.getElementById('loadingOverlay');

        // Tab Switching
        loginTab.addEventListener('click', () => {
            loginTab.className = 'flex-1 pb-3 text-sm font-semibold tab-active transition-colors';
            registerTab.className = 'flex-1 pb-3 text-sm font-semibold tab-inactive transition-colors';
            loginForm.classList.remove('hidden');
            registerForm.classList.add('hidden');
        });

        registerTab.addEventListener('click', () => {
            registerTab.className = 'flex-1 pb-3 text-sm font-semibold tab-active transition-colors';
            loginTab.className = 'flex-1 pb-3 text-sm font-semibold tab-inactive transition-colors';
            registerForm.classList.remove('hidden');
            loginForm.classList.add('hidden');
        });

        function showToast(message, type = 'success') {
            const icon = document.getElementById('toastIcon');
            icon.className = type === 'success' ? 'fas fa-check-circle text-green-500' : 
                           type === 'error' ? 'fas fa-exclamation-circle text-red-500' : 
                           'fas fa-info-circle text-blue-500';
            document.getElementById('toastMessage').textContent = message;
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 3000);
        }

        function showLoading(show, msg = 'Aguarde...') {
            document.getElementById('loadingMessage').textContent = msg;
            if (show) {
                loadingOverlay.classList.remove('hidden');
                loadingOverlay.classList.add('flex');
            } else {
                loadingOverlay.classList.add('hidden');
                loadingOverlay.classList.remove('flex');
            }
        }

        function togglePassword(id, btn) {
            const input = document.getElementById(id);
            const icon = btn.querySelector('i');
            if (input.type === 'password') {
                input.type = 'text';
                icon.className = 'fas fa-eye-slash text-sm text-black';
            } else {
                input.type = 'password';
                icon.className = 'fas fa-eye text-sm';
            }
        }

        function fazerLogin() {
            const email = document.getElementById('loginEmail').value;
            const password = document.getElementById('loginPassword').value;
            
            if (!email || !password) return showToast('Preencha os campos.', 'error');
            
            showLoading(true, 'Autenticando...');
            auth.signInWithEmailAndPassword(email, password)
                .then((cred) => {
                    localStorage.setItem('user', JSON.stringify({ uid: cred.user.uid, email: cred.user.email }));
                    window.location.href = 'checklist.html';
                })
                .catch((err) => {
                    showLoading(false);
                    showToast('Credenciais incorretas.', 'error');
                });
        }

        function fazerCadastro() {
            const nome = document.getElementById('regNome').value;
            const email = document.getElementById('regEmail').value;
            const pass = document.getElementById('regPassword').value;
            const conf = document.getElementById('regConfirmPassword').value;
            const cargo = document.getElementById('regCargo').value;
            const reg = document.getElementById('regRegional').value;
            const termos = document.getElementById('termos').checked;
            
            if (!nome || !email || !pass || !cargo || !reg) return showToast('Preencha tudo.', 'error');
            if (pass !== conf) return showToast('Senhas diferentes.', 'error');
            if (!termos) return showToast('Aceite os termos.', 'error');
            
            showLoading(true, 'Criando conta...');
            auth.createUserWithEmailAndPassword(email, pass)
                .then((cred) => cred.user.updateProfile({ displayName: nome }).then(() => cred))
                .then((cred) => database.ref(`usuarios/${cred.user.uid}`).set({
                    nome, email, cargo, regional: reg, dataCadastro: new Date().toISOString(), uid: cred.user.uid
                }))
                .then(() => window.location.href = 'checklist.html')
                .catch((err) => {
                    showLoading(false);
                    showToast('Erro no cadastro.', 'error');
                });
        }

        function recuperarSenha() {
            const email = document.getElementById('loginEmail').value;
            if (!email) return showToast('Digite o e-mail no campo acima.', 'error');
            
            showLoading(true);
            auth.sendPasswordResetEmail(email)
                .then(() => {
                    showLoading(false);
                    showToast('Instruções enviadas para o e-mail.', 'success');
                })
                .catch(() => {
                    showLoading(false);
                    showToast('Erro ao enviar e-mail.', 'error');
                });
        }

        // Observador de estado de autenticação (Mantido, mas certifique-se de arrumar o botão "Sair" na outra tela)
        auth.onAuthStateChanged((user) => {
            if (user) {
                window.location.href = 'checklist.html';
            }
        });
    </script>
</body>
</html>
